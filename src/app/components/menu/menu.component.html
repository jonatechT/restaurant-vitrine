<header class="bg-rose-600 text-white sticky top-0 z-50 shadow-md">
  <div class="px-4 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold">Délices</h1>
      
    </div>
    
    <div class="flex items-center gap-2">
      <span class="px-4 py-1.5 bg-white/20 backdrop-blur-md text-xs font-medium rounded-full">
        Ouvert maintenant
      </span>
    </div>
  </div>
  
</header>
<!-- ==================== CONTENU DU MENU ==================== -->
<div class="px-4 pt-6 pb-24">

  <!-- Catégories -->
  <div class="flex gap-3 overflow-x-auto pb-6 scrollbar-hide">
    <button 
      *ngFor="let cat of categories"
      (click)="filterByCategorie(cat.nom)"
      class="flex-shrink-0 px-5 py-3 bg-white rounded-2xl shadow-sm text-center hover:bg-rose-50 transition-all border border-transparent"
      [class.!border-rose-500]="selectedCategorie === cat.nom">
      <span class="text-3xl block mb-1">{{ cat.icon }}</span>
      <span class="text-sm font-medium whitespace-nowrap">{{ cat.nom }}</span>
    </button>
  </div>

  <!-- Liste des plats - Cartes plus étroites -->
  <div class="space-y-4">
    <div *ngFor="let plat of platsFiltres" 
         (click)="openDetails(plat)"
         class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-md transition-all cursor-pointer active:scale-[0.98]">
      
      <img [src]="plat.image" 
           class="w-full h-44 object-cover">   <!-- Hauteur réduite pour mieux voir l'image -->
      
      <div class="p-4">
        <div class="flex justify-between items-start">
          <h3 class="font-semibold text-lg leading-tight">{{ plat.nom }}</h3>
          <p class="text-xl font-bold text-rose-600 whitespace-nowrap ml-3">{{ plat.prix | number }} FCFA</p>
        </div>
        <p class="text-gray-600 text-sm line-clamp-2 mt-2">{{ plat.description }}</p>
        
        <div class="mt-4 flex justify-between items-center">
          <span [class]="plat.disponible ? 'text-green-600' : 'text-red-500'" class="text-xs font-medium">
            {{ plat.disponible ? '✅ Disponible' : '❌ Indisponible' }}
          </span>
          <span class="text-rose-500 text-sm font-medium">Détails →</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Détail Plat (inchangé) -->
<div *ngIf="selectedPlat" class="fixed inset-0 bg-black/70 z-[60] flex items-end">
  <div class="bg-white w-full rounded-t-3xl max-h-[85vh] overflow-auto">
    <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center z-10">
      <h2 class="font-bold text-xl">{{ selectedPlat.nom }}</h2>
      <button (click)="closeModal()" class="text-4xl leading-none text-gray-400">×</button>
    </div>
    
    <img [src]="selectedPlat.image" class="w-full h-64 object-cover">
    
    <div class="p-5">
      <p class="text-3xl font-bold text-rose-600 mb-4">{{ selectedPlat.prix | number }} FCFA</p>
      <p class="text-gray-700 leading-relaxed">{{ selectedPlat.description }}</p>
    </div>
  </div>
</div>
