<div class="px-4 pt-6 pb-24">

  <!-- Catégories -->
  <div class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide">
    <button 
      *ngFor="let cat of categories"
      (click)="filterByCategorie(cat.nom)"
      class="flex-shrink-0 px-6 py-3 bg-white rounded-2xl shadow-sm text-center hover:bg-rose-50 transition-all border"
      [class.!border-rose-500]="selectedCategorie === cat.nom">
      <span class="text-3xl block mb-1">{{ cat.icon }}</span>
      <span class="text-sm font-medium whitespace-nowrap">{{ cat.nom }}</span>
    </button>
  </div>

  <!-- Liste des plats -->
  <div class="space-y-4">
    <div *ngFor="let plat of platsFiltres" 
         (click)="openDetails(plat)"
         class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-md transition-all cursor-pointer active:scale-[0.98]">
      
      <img [src]="plat.image" class="w-full h-48 object-cover">
      
      <div class="p-4">
        <div class="flex justify-between">
          <h3 class="font-semibold text-lg">{{ plat.nom }}</h3>
          <p class="text-xl font-bold text-rose-600">{{ plat.prix | number }} FCFA</p>
        </div>
        <p class="text-gray-600 text-sm line-clamp-2 mt-1">{{ plat.description }}</p>
        
        <div class="mt-3 flex justify-between items-center">
          <span [class]="plat.disponible ? 'text-green-600' : 'text-red-500'" class="text-xs font-medium">
            {{ plat.disponible ? '✅ Disponible' : '❌ Indisponible' }}
          </span>
          <span class="text-rose-500 text-sm font-medium">Voir détails →</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Détail Plat -->
<div *ngIf="selectedPlat" class="fixed inset-0 bg-black/70 z-50 flex items-end">
  <div class="bg-white w-full rounded-t-3xl max-h-[85vh] overflow-auto">
    <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
      <h2 class="font-bold text-xl">{{ selectedPlat.nom }}</h2>
      <button (click)="closeModal()" class="text-3xl leading-none">×</button>
    </div>
    
    <img [src]="selectedPlat.image" class="w-full h-64 object-cover">
    
    <div class="p-5">
      <p class="text-3xl font-bold text-rose-600 mb-4">{{ selectedPlat.prix | number }} FCFA</p>
      <p class="text-gray-700 leading-relaxed">{{ selectedPlat.description }}</p>
      
      <button class="mt-8 w-full bg-rose-600 text-white py-4 rounded-2xl font-semibold text-lg active:bg-rose-700">
        Ajouter au panier (Bientôt)
      </button>
    </div>
  </div>
</div>
