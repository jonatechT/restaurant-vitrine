<div class="restaurant-app min-h-screen bg-gray-50">

  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="flex items-center justify-between px-4 py-3 border-b">
      <div>
        <h1 class="text-2xl font-bold text-rose-600">{{ restaurantName }}</h1>
        <p class="text-sm text-gray-500">Table {{ tableNumber }} • Ouaga, Burkina Faso</p>
      </div>
      <div class="flex items-center gap-2">
        <span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-medium rounded-full flex items-center gap-1">
          <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
          Ouvert
        </span>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <div class="bg-gradient-to-br from-rose-500 to-pink-600 text-white px-6 py-8">
    <h2 class="text-3xl font-bold mb-1">Bienvenue ! 👋</h2>
    <p class="opacity-90">Que souhaitez-vous manger aujourd'hui ?</p>
  </div>

  <!-- Menu du Jour -->
  <div class="px-4 -mt-4 relative z-10">
    <div class="bg-white rounded-3xl shadow-md p-5">
      <div class="flex items-center gap-2 mb-2">
        <span class="text-2xl">🔥</span>
        <h3 class="font-semibold text-lg">Menu du Jour</h3>
      </div>
      <p class="font-medium">Poulet Rôti + Riz + Sauce Arachide - <span class="text-rose-600 font-bold">4 500 FCFA</span></p>
    </div>
  </div>

  <!-- Composant Menu -->
  <app-menu></app-menu>

  <!-- Bouton WhatsApp flottant -->
  <button 
    class="fixed bottom-6 right-6 w-14 h-14 bg-green-500 hover:bg-green-600 text-white rounded-full flex items-center justify-center shadow-xl transition-all text-3xl z-50">
    💬
  </button>

</div>
